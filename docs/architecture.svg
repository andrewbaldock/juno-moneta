<svg xmlns="http://www.w3.org/2000/svg" width="1320" height="820" viewBox="0 0 1320 820" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4b5563"/>
    </marker>
    <marker id="arrD" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="1320" height="820" fill="#faf7f0"/>

  <!-- title -->
  <text x="40" y="38" font-size="21" font-weight="700" fill="#1f2937">Juno — System Architecture</text>
  <text x="40" y="60" font-size="13" fill="#6b7280">React SPA · Supabase (Postgres + RLS + Edge Functions) · Claude · Vercel &#160;·&#160; browser talks directly to Supabase under RLS; only server code is the two edge functions</text>

  <!-- ===== CI / deploy band ===== -->
  <rect x="60" y="88" width="210" height="52" rx="9" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
  <text x="165" y="110" font-size="13" font-weight="600" text-anchor="middle" fill="#1f2937">GitHub · juno-moneta</text>
  <text x="165" y="127" font-size="11" text-anchor="middle" fill="#6b7280">source of truth</text>

  <rect x="360" y="88" width="220" height="52" rx="9" fill="#111827" stroke="#111827"/>
  <text x="470" y="110" font-size="13" font-weight="600" text-anchor="middle" fill="#ffffff">Vercel</text>
  <text x="470" y="127" font-size="11" text-anchor="middle" fill="#cbd5e1">static SPA host + CI/CD</text>

  <rect x="1070" y="88" width="200" height="52" rx="9" fill="#eafaf1" stroke="#3ECF8E" stroke-width="1.5"/>
  <text x="1170" y="110" font-size="13" font-weight="600" text-anchor="middle" fill="#0b7a4f">Supabase CLI</text>
  <text x="1170" y="127" font-size="11" text-anchor="middle" fill="#3a7a5f">manual edge-fn deploy</text>

  <!-- GitHub -> Vercel (deploy) -->
  <line x1="270" y1="114" x2="358" y2="114" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrD)"/>
  <text x="314" y="106" font-size="10" text-anchor="middle" fill="#9ca3af">push → deploy</text>

  <!-- ===== Client boundary ===== -->
  <rect x="40" y="176" width="430" height="470" rx="14" fill="none" stroke="#c9bda0" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="56" y="198" font-size="12" font-weight="600" fill="#8a7a55">HOUSEHOLD MEMBER · BROWSER (PWA-installable)</text>

  <rect x="64" y="214" width="382" height="80" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
  <text x="255" y="240" font-size="13.5" font-weight="600" text-anchor="middle" fill="#1f2937">React 19 SPA — shell · screens · Recharts</text>
  <text x="255" y="259" font-size="11" text-anchor="middle" fill="#6b7280">History-API routing (no router lib), no store</text>
  <text x="255" y="277" font-size="11" text-anchor="middle" fill="#6b7280">Dashboard · Accounts · Cash flows · Estate · Tasks · Advisor</text>

  <rect x="64" y="316" width="184" height="120" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
  <text x="156" y="342" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1f2937">Local finance engine</text>
  <text x="156" y="360" font-size="11" text-anchor="middle" fill="#6b7280">pure src/lib/</text>
  <text x="156" y="380" font-size="11" text-anchor="middle" fill="#6b7280">metrics · projections</text>
  <text x="156" y="396" font-size="11" text-anchor="middle" fill="#6b7280">amortization · runway</text>
  <text x="156" y="416" font-size="11" text-anchor="middle" fill="#6b7280">integer cents</text>

  <rect x="262" y="316" width="184" height="120" rx="10" fill="#ffffff" stroke="#6b7280" stroke-width="1.5"/>
  <text x="354" y="342" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1f2937">localStorage</text>
  <text x="354" y="362" font-size="11" text-anchor="middle" fill="#6b7280">UI prefs &amp; task</text>
  <text x="354" y="378" font-size="11" text-anchor="middle" fill="#6b7280">dismissals only</text>
  <text x="354" y="400" font-size="11" text-anchor="middle" fill="#b45309">no financial data</text>
  <text x="354" y="416" font-size="11" text-anchor="middle" fill="#b45309">no secrets</text>

  <text x="255" y="470" font-size="10.5" text-anchor="middle" fill="#8a7a55">Claude returns scenario deltas → the local engine computes every projection</text>
  <text x="255" y="486" font-size="10.5" text-anchor="middle" fill="#8a7a55">validated edits are written back to Postgres under RLS</text>

  <!-- Vercel -> SPA -->
  <line x1="450" y1="140" x2="330" y2="212" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="330" y="176" font-size="10" text-anchor="middle" fill="#4b5563">serves SPA bundle</text>

  <!-- ===== Supabase boundary ===== -->
  <rect x="620" y="176" width="436" height="560" rx="14" fill="none" stroke="#3ECF8E" stroke-width="1.6" stroke-dasharray="7 5"/>
  <text x="636" y="198" font-size="12" font-weight="700" fill="#0b7a4f">SUPABASE PROJECT (juno) · region us-east-2</text>

  <rect x="644" y="212" width="388" height="56" rx="10" fill="#eafaf1" stroke="#3ECF8E" stroke-width="1.5"/>
  <text x="838" y="235" font-size="13" font-weight="600" text-anchor="middle" fill="#0b7a4f">Auth (GoTrue)</text>
  <text x="838" y="253" font-size="11" text-anchor="middle" fill="#3a7a5f">email/password · JWT · reset &amp; recovery</text>

  <rect x="644" y="288" width="388" height="176" rx="10" fill="#eafaf1" stroke="#3ECF8E" stroke-width="1.5"/>
  <text x="838" y="312" font-size="13" font-weight="700" text-anchor="middle" fill="#0b7a4f">Postgres + Row-Level Security</text>
  <text x="838" y="336" font-size="11" text-anchor="middle" fill="#245c44">households · household_members · accounts</text>
  <text x="838" y="354" font-size="11" text-anchor="middle" fill="#245c44">balance_snapshots (append-only) · cash_flows</text>
  <text x="838" y="372" font-size="11" text-anchor="middle" fill="#245c44">conversations · messages · juno_notes · estate_items</text>
  <text x="838" y="398" font-size="11" text-anchor="middle" fill="#245c44">money = bigint cents · NULL = unknown</text>
  <text x="838" y="424" font-size="11.5" font-weight="600" text-anchor="middle" fill="#0b7a4f">is_member() SECURITY DEFINER gates every table</text>
  <text x="838" y="446" font-size="10.5" text-anchor="middle" fill="#3a7a5f">triggers: snapshot_balance · touch_updated_at</text>

  <rect x="644" y="486" width="388" height="98" rx="10" fill="#f3eefb" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="838" y="510" font-size="13" font-weight="600" text-anchor="middle" fill="#5b21b6">Edge Function · claude-proxy (Deno)</text>
  <text x="838" y="530" font-size="11" text-anchor="middle" fill="#6d4aad">JWT-gated · holds ANTHROPIC_API_KEY</text>
  <text x="838" y="548" font-size="11" text-anchor="middle" fill="#6d4aad">system prompt + forced &#8216;advise&#8217; tool</text>
  <text x="838" y="568" font-size="11" text-anchor="middle" fill="#6d4aad">input caps: &#8804;40 msgs, &#8804;30 KB snapshot</text>

  <rect x="644" y="604" width="388" height="98" rx="10" fill="#f3eefb" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="838" y="628" font-size="13" font-weight="600" text-anchor="middle" fill="#5b21b6">Edge Function · calendar-ics (Deno)</text>
  <text x="838" y="648" font-size="11" text-anchor="middle" fill="#6d4aad">token-in-URL · service role key</text>
  <text x="838" y="666" font-size="11" text-anchor="middle" fill="#6d4aad">verify_jwt OFF (calendar apps fetch anonymously)</text>
  <text x="838" y="686" font-size="11" text-anchor="middle" fill="#6d4aad">emits RFC-5545 bill feed</text>

  <!-- ===== External nodes ===== -->
  <rect x="1120" y="486" width="180" height="98" rx="10" fill="#f7ede7" stroke="#d97757" stroke-width="1.5"/>
  <text x="1210" y="512" font-size="13" font-weight="600" text-anchor="middle" fill="#a8442a">Anthropic API</text>
  <text x="1210" y="533" font-size="11" text-anchor="middle" fill="#b0553a">Claude Sonnet 5</text>
  <text x="1210" y="550" font-size="11" text-anchor="middle" fill="#b0553a">(advice)</text>
  <text x="1210" y="570" font-size="11" text-anchor="middle" fill="#b0553a">Haiku 4.5 (health)</text>

  <rect x="1120" y="604" width="180" height="98" rx="10" fill="#eef2ff" stroke="#6b7fd9" stroke-width="1.5"/>
  <text x="1210" y="640" font-size="13" font-weight="600" text-anchor="middle" fill="#3a4aa0">Google / Apple</text>
  <text x="1210" y="658" font-size="13" font-weight="600" text-anchor="middle" fill="#3a4aa0">Calendar</text>
  <text x="1210" y="678" font-size="11" text-anchor="middle" fill="#4a5ab0">(subscribers)</text>

  <!-- ===== Runtime arrows ===== -->
  <!-- SPA -> Auth -->
  <line x1="446" y1="236" x2="642" y2="238" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="544" y="228" font-size="10" text-anchor="middle" fill="#4b5563">sign in → JWT</text>

  <!-- SPA -> Postgres (CRUD) -->
  <line x1="446" y1="262" x2="642" y2="340" stroke="#4b5563" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="545" y="300" font-size="10" text-anchor="middle" fill="#4b5563">CRUD via PostgREST</text>
  <text x="545" y="313" font-size="10" text-anchor="middle" fill="#4b5563">(anon key + JWT, under RLS)</text>

  <!-- SPA -> claude-proxy -->
  <line x1="446" y1="286" x2="642" y2="520" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="540" y="470" font-size="10" text-anchor="middle" fill="#4b5563">invoke (JWT):</text>
  <text x="540" y="483" font-size="10" text-anchor="middle" fill="#4b5563">snapshot + question</text>

  <!-- claude-proxy -> Anthropic (request/advice) -->
  <line x1="1032" y1="530" x2="1118" y2="530" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <line x1="1118" y1="545" x2="1034" y2="545" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="1075" y="512" font-size="10" text-anchor="middle" fill="#a8442a">names/$/rates only</text>
  <text x="1075" y="566" font-size="10" text-anchor="middle" fill="#4b5563">advice (deltas)</text>

  <!-- Calendar clients -> calendar-ics -->
  <line x1="1118" y1="653" x2="1034" y2="653" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="1076" y="645" font-size="10" text-anchor="middle" fill="#3a4aa0">GET ?t=token</text>

  <!-- calendar-ics -> Postgres (service role read) -->
  <path d="M838,604 L838,466" fill="none" stroke="#4b5563" stroke-width="1.6" marker-end="url(#arr)"/>
  <text x="838" y="596" font-size="10" text-anchor="middle" fill="#4b5563">read active cash_flows (service role)</text>

  <!-- Supabase CLI -> edge functions (deploy) -->
  <path d="M1170,140 L1170,300 Q1170,470 1034,505" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrD)"/>
  <text x="1200" y="300" font-size="10" text-anchor="middle" fill="#9ca3af">deploy edge fns</text>

  <!-- ===== Legend ===== -->
  <rect x="40" y="676" width="430" height="118" rx="10" fill="#ffffff" stroke="#e5ddc8"/>
  <text x="56" y="700" font-size="12" font-weight="700" fill="#1f2937">Legend</text>
  <line x1="58" y1="718" x2="98" y2="718" stroke="#4b5563" stroke-width="1.8" marker-end="url(#arr)"/>
  <text x="108" y="722" font-size="11" fill="#4b5563">runtime request (HTTPS)</text>
  <line x1="58" y1="740" x2="98" y2="740" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#arrD)"/>
  <text x="108" y="744" font-size="11" fill="#6b7280">deploy / CI</text>
  <text x="58" y="768" font-size="11" fill="#8a7a55">• Claude never sees raw balances, account numbers, or the jsonb detail bag.</text>
  <text x="58" y="784" font-size="11" fill="#8a7a55">• Anon key is safe to ship — RLS, not the key, is the access boundary.</text>
</svg>
